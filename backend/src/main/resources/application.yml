spring:
  application:
    name: cangchu-backend
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    table: flyway_schema_history

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deletedAt
      logic-delete-value: "now()"
      logic-not-delete-value: "null"
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath*:/mapper/**/*.xml

sa-token:
  token-name: Authorization
  timeout: 28800
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: tik
  is-log: true
  is-print: false

logging:
  level:
    com.cangchu: DEBUG
    com.baomidou.mybatisplus: DEBUG

cangchu:
  tenant:
    leak-detection: true
  # D-03: 短信 mock（万能验证码 888888）严禁在主配开启，已移出主配；
  # 仅 dev profile 的 application-dev.yml 提供 mock 开关，prod 永不放行 888888。
  sms:
    mock: false
  snowflake:
    worker-id: 1
    datacenter-id: 1
