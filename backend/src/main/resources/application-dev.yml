spring:
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/cangchu_dev?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&connectionCollation=utf8mb4_unicode_ci}
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      connection-timeout: 20000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DB:0}
      # 本机 Memurai 无密码：不能写 password: ${REDIS_PASSWORD:}（空串会让 Redisson 发 AUTH 空密码 →
      # "ERR AUTH called without any password configured" 启动失败）。生产请在 prod profile 显式配置 password。
      timeout: 3000ms
      # D-15: lettuce.pool 已失效——连接池由 Redisson 接管（见 RedisConfig.redissonCustomizer），
      # Sa-Token / RAtomicLong 等均走 Redisson 客户端，此处 lettuce 池配置不再生效，已移除。

cangchu:
  tenant:
    leak-detection: true
  sms:
    mock: true
    mock-code: "888888"
