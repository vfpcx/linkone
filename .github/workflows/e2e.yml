name: E2E (admin · Playwright)

# 触发方式：
#  - 手动触发（workflow_dispatch）：当前阶段推荐方式，确保前置服务可控
#  - push / PR 到 main 且改动 frontend/** 时跑（前置服务就绪后再放开，见下方 TODO）
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/e2e.yml'

# ⚠️ 前置依赖说明（CI 真跑通的 TODO，由 Team Lead 决策落地）
# 本 job 已搭好 pnpm 依赖安装 + Playwright 浏览器安装 + 测试执行步骤。
# 但 E2E 依赖运行中的「前端 5173 + 后端 8080（需 MySQL + Redis）」，CI 上需补齐：
#   方案 A（推荐）：docker-compose 起 mysql/redis/backend，再 `pnpm dev:admin &` 起前端
#   方案 B：services: 块起 mysql + redis，后端用构建产物 jar 起，前端 dev/preview 起
# 在前置就绪前，push/pull_request 触发会因服务不可达而失败，可仅保留 workflow_dispatch。

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25

    # TODO(team-lead): 启用以下 services 提供 MySQL / Redis（端口/账号需与后端 application 配置对齐）
    # services:
    #   mysql:
    #     image: mysql:8.0
    #     env:
    #       MYSQL_ROOT_PASSWORD: root
    #       MYSQL_DATABASE: cangchu
    #     ports: ['3306:3306']
    #     options: >-
    #       --health-cmd="mysqladmin ping -h localhost" --health-interval=10s
    #       --health-timeout=5s --health-retries=10
    #   redis:
    #     image: redis:7
    #     ports: ['6379:6379']
    #     options: >-
    #       --health-cmd="redis-cli ping" --health-interval=10s
    #       --health-timeout=5s --health-retries=10

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.10.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser (chromium)
        run: pnpm --filter @cangchu/admin exec playwright install --with-deps chromium

      # ----------------------------------------------------------------------
      # TODO(team-lead): 前后端起服务（前置服务方案确定后取消注释并补全）
      #
      # - name: Start backend stack (mysql/redis/backend)
      #   working-directory: .
      #   run: docker compose -f ci/docker-compose.e2e.yml up -d --wait
      #
      # - name: Start admin dev server
      #   run: pnpm --filter @cangchu/admin dev &
      #
      # - name: Wait for services
      #   run: npx wait-on http://localhost:5173 http://localhost:8080/actuator/health
      # ----------------------------------------------------------------------

      - name: Run Playwright E2E
        # 前置服务就绪前会失败，故此处暂不强约束。前置补齐后删除 continue-on-error。
        continue-on-error: true
        run: pnpm --filter @cangchu/admin e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/apps/admin/playwright-report
          retention-days: 7

      - name: Upload failure traces & screenshots
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/apps/admin/test-results
          retention-days: 7
